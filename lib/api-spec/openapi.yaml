openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: StormRaven OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Operator authentication
  - name: system
    description: System metrics and status
  - name: realms
    description: Yggdrasil realm operations
  - name: modules
    description: Module management
  - name: audit
    description: Security audit logs
  - name: terminal
    description: Terminal command execution
  - name: kernel
    description: Live kernel core telemetry
  - name: fs
    description: Filesystem browsing and editing
  - name: monitor
    description: Live process monitoring
  - name: packages
    description: Software package catalog
  - name: leviathan
    description: Leviathan operator intelligence
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate operator and receive an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Verify the current access token
      responses:
        "200":
          description: Token valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /system/metrics:
    get:
      operationId: getSystemMetrics
      tags: [system]
      summary: Get live system metrics
      description: Returns memory, CPU, uptime, active module count, and threat level
      responses:
        "200":
          description: System metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemMetrics"

  /realms:
    get:
      operationId: getRealms
      tags: [realms]
      summary: List all Yggdrasil realms
      responses:
        "200":
          description: List of realms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Realm"

  /realms/{id}:
    get:
      operationId: getRealm
      tags: [realms]
      summary: Get a specific realm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Realm details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Realm"
        "404":
          description: Realm not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules:
    get:
      operationId: getModules
      tags: [modules]
      summary: List all modules
      responses:
        "200":
          description: List of modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"

  /modules/{id}:
    get:
      operationId: getModule
      tags: [modules]
      summary: Get a specific module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"
        "404":
          description: Module not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateModule
      tags: [modules]
      summary: Update module status (activate/deactivate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleUpdate"
      responses:
        "200":
          description: Updated module
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"
        "404":
          description: Module not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit-logs:
    get:
      operationId: getAuditLogs
      tags: [audit]
      summary: List security audit logs
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: severity
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /terminal:
    post:
      operationId: executeCommand
      tags: [terminal]
      summary: Execute a terminal command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandInput"
      responses:
        "200":
          description: Command output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"

  /terminal/history:
    get:
      operationId: getTerminalHistory
      tags: [terminal]
      summary: Get terminal command history
      responses:
        "200":
          description: List of executed commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommandResult"

  /kernel/log:
    get:
      operationId: getKernelLog
      tags: [kernel]
      summary: Live kernel and hardened-core boot log
      description: Real kernel/system facts gathered live from the host (uname, /proc, mounts, crypto flags).
      responses:
        "200":
          description: Kernel log snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KernelLog"

  /fs/list:
    get:
      operationId: getFsList
      tags: [fs]
      summary: List a directory on the host filesystem
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FsListing"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fs/read:
    get:
      operationId: getFsRead
      tags: [fs]
      summary: Read a file from the host filesystem
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FsFile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fs/write:
    post:
      operationId: writeFsFile
      tags: [fs]
      summary: Write a file to the host filesystem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FsWriteInput"
      responses:
        "200":
          description: Write result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FsWriteResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /system/processes:
    get:
      operationId: getProcesses
      tags: [monitor]
      summary: Live process list with CPU and memory usage
      responses:
        "200":
          description: Process snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessList"

  /packages:
    get:
      operationId: getPackages
      tags: [packages]
      summary: Software catalog with real install status
      responses:
        "200":
          description: Package catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageList"

  /leviathan/chat:
    post:
      operationId: leviathanChat
      tags: [leviathan]
      summary: Converse with the Leviathan operator intelligence
      description: Sends the conversation so far to Leviathan and returns its reply. Auth required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeviathanChatInput"
      responses:
        "200":
          description: Leviathan reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeviathanChatResult"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect on success or failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
            default: /
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /roe/status:
    get:
      operationId: getRoeStatus
      tags: [defense]
      summary: Current Rules of Engagement and acceptance status
      responses:
        "200":
          description: RoE status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoeStatus"

  /roe/accept:
    post:
      operationId: acceptRoe
      tags: [defense]
      summary: Record acceptance of the Rules of Engagement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoeAcceptInput"
      responses:
        "200":
          description: Acceptance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoeAcceptance"

  /integrity/status:
    get:
      operationId: getIntegrityStatus
      tags: [defense]
      summary: Heimdallr file-integrity status overview
      responses:
        "200":
          description: Integrity status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityStatus"

  /integrity/baselines:
    get:
      operationId: getIntegrityBaselines
      tags: [defense]
      summary: List integrity baselines and pending watched paths
      responses:
        "200":
          description: Baselines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityBaselineList"

  /integrity/baseline:
    post:
      operationId: captureIntegrityBaseline
      tags: [defense]
      summary: Capture / refresh the integrity baseline for all watched paths
      responses:
        "200":
          description: Baseline captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityScanResult"

  /integrity/scan:
    post:
      operationId: runIntegrityScan
      tags: [defense]
      summary: Scan watched paths against the baseline
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityScanResult"

  /integrity/alerts:
    get:
      operationId: getIntegrityAlerts
      tags: [defense]
      summary: List file-integrity alerts
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrityAlert"

  /integrity/alerts/{id}:
    patch:
      operationId: updateIntegrityAlert
      tags: [defense]
      summary: Resolve an integrity alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrityAlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityAlert"

  /incidents:
    get:
      operationId: getIncidents
      tags: [defense]
      summary: List security incidents
      responses:
        "200":
          description: Incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
    post:
      operationId: createIncident
      tags: [defense]
      summary: Open a new security incident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentCreate"
      responses:
        "200":
          description: Created incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{id}:
    patch:
      operationId: updateIncident
      tags: [defense]
      summary: Acknowledge or resolve an incident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentUpdate"
      responses:
        "200":
          description: Updated incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /defense/anomalies:
    get:
      operationId: getAnomalies
      tags: [defense]
      summary: Intrusion / anomaly detection feed
      responses:
        "200":
          description: Anomalies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyReport"

  /defense/posture:
    get:
      operationId: getPosture
      tags: [defense]
      summary: Overall defensive posture
      responses:
        "200":
          description: Posture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefensePosture"

  /compliance/report:
    get:
      operationId: getComplianceReport
      tags: [defense]
      summary: Exportable ethics / compliance report
      responses:
        "200":
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceReport"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    LeviathanChatInput:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    LeviathanChatResult:
      type: object
      required:
        - reply
      properties:
        reply:
          type: string
        model:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    KernelLogLine:
      type: object
      required:
        - seq
        - timestamp
        - level
        - subsystem
        - message
      properties:
        seq:
          type: integer
        timestamp:
          type: number
        level:
          type: string
        subsystem:
          type: string
        message:
          type: string

    KernelLog:
      type: object
      required:
        - kernelVersion
        - hostname
        - capturedAt
        - lines
      properties:
        kernelVersion:
          type: string
        hostname:
          type: string
        capturedAt:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/KernelLogLine"

    SystemMetrics:
      type: object
      required:
        - memoryPercent
        - cpuPercent
        - uptimeSeconds
        - activeModules
        - totalModules
        - threatLevel
        - activeRealms
        - authLevel
      properties:
        memoryPercent:
          type: number
        cpuPercent:
          type: number
        uptimeSeconds:
          type: integer
        activeModules:
          type: integer
        totalModules:
          type: integer
        threatLevel:
          type: string
        activeRealms:
          type: integer
        authLevel:
          type: string

    Realm:
      type: object
      required:
        - id
        - name
        - codename
        - status
        - description
        - mountPath
      properties:
        id:
          type: integer
        name:
          type: string
        codename:
          type: string
        status:
          type: string
        description:
          type: string
        mountPath:
          type: string
        diskUsagePercent:
          type: ["number", "null"]
        activeProcesses:
          type: ["integer", "null"]

    Module:
      type: object
      required:
        - id
        - name
        - codename
        - realmId
        - realmName
        - status
        - description
        - authLevel
      properties:
        id:
          type: integer
        name:
          type: string
        codename:
          type: string
        realmId:
          type: integer
        realmName:
          type: string
        status:
          type: string
        description:
          type: string
        authLevel:
          type: string
        lastActivated:
          type: ["string", "null"]
        pid:
          type: ["integer", "null"]
        command:
          type: ["string", "null"]

    ModuleUpdate:
      type: object
      properties:
        status:
          type: string

    AuditLog:
      type: object
      required:
        - id
        - timestamp
        - eventType
        - severity
        - message
      properties:
        id:
          type: integer
        timestamp:
          type: string
        eventType:
          type: string
        severity:
          type: string
        message:
          type: string
        realmName:
          type: ["string", "null"]
        moduleName:
          type: ["string", "null"]

    CommandInput:
      type: object
      required:
        - command
      properties:
        command:
          type: string

    CommandResult:
      type: object
      required:
        - id
        - command
        - output
        - exitCode
        - executedAt
      properties:
        id:
          type: integer
        command:
          type: string
        output:
          type: string
        exitCode:
          type: integer
        executedAt:
          type: string

    LoginInput:
      type: object
      required:
        - password
      properties:
        password:
          type: string

    AuthToken:
      type: object
      required:
        - token
        - operator
      properties:
        token:
          type: string
        operator:
          type: string

    AuthStatus:
      type: object
      required:
        - authenticated
        - operator
      properties:
        authenticated:
          type: boolean
        operator:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    FsEntry:
      type: object
      required:
        - name
        - path
        - type
        - size
        - modified
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
        size:
          type: ["number", "null"]
        modified:
          type: ["string", "null"]

    FsListing:
      type: object
      required:
        - path
        - parent
        - entries
      properties:
        path:
          type: string
        parent:
          type: ["string", "null"]
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FsEntry"

    FsFile:
      type: object
      required:
        - path
        - content
        - size
        - truncated
      properties:
        path:
          type: string
        content:
          type: string
        size:
          type: integer
        truncated:
          type: boolean

    FsWriteInput:
      type: object
      required:
        - path
        - content
      properties:
        path:
          type: string
        content:
          type: string

    FsWriteResult:
      type: object
      required:
        - ok
        - path
        - bytes
      properties:
        ok:
          type: boolean
        path:
          type: string
        bytes:
          type: integer

    ProcessInfo:
      type: object
      required:
        - pid
        - user
        - cpu
        - mem
        - command
      properties:
        pid:
          type: integer
        user:
          type: string
        cpu:
          type: number
        mem:
          type: number
        command:
          type: string

    ProcessList:
      type: object
      required:
        - capturedAt
        - count
